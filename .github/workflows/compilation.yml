name: CI

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ${{ matrix.os }}
    strategy:
      matrix:
        os: [alpine:latest, fedora:latest, debian:latest]
      fail-fast: false

    steps:
    - name: Install Debian build dependencies
      if: startsWith(matrix.os, 'debian')
      run: |
        apt-get update
        apt-get install -y wget adduser build-essential python3 python3-venv pkgconf libcurl4 libcurl4-openssl-dev libssl-dev libarchive-tools libarchive-dev libgpgme-dev git sudo
        adduser --system --group build

    - name: Install Alpine build dependencies
      if: startsWith(matrix.os, 'alpine')
      run: |
        apk add wget wget build-base bash python3 py3-pip pkgconfig libarchive-tools libarchive-dev openssl-dev gpgme-dev curl-dev git sudo fakeroot
        adduser -D -s /bin/bash build

    - name: Install Fedora build dependencies
      if: startsWith(matrix.os, 'fedora')
      run: |
        dnf -y install gcc python3 python3-pip wget bsdtar libarchive-devel openssl-devel gpgme-devel libcurl-devel pkgconf git patch sudo which fakeroot
        useradd build

    - uses: actions/checkout@v6

    - name: Compile project
      run: |
        chown -R $(id -nu):$(id -ng) .
        export PSPDEV="$PWD/pspdev"
        export PATH="$PATH:$PSPDEV/bin"
        ./pacman.sh

    - name: Test psp-pacman
      run: |
        export PSPDEV="$PWD/pspdev"
        export PATH="$PATH:$PSPDEV/bin"
        psp-pacman -Syu --noconfirm --noprogressbar stb
        psp-pacman -Qi stb
        psp-pacman -R --noconfirm stb
        psp-pacman -Scc --noconfirm

    - name: Test psp-makepkg
      run: |
        export PSPDEV=$PWD/pspdev
        export PATH="$PATH:$PSPDEV/bin"
        # Prevent stripping, since PSPDEV is not actually installed
        sed -i '/^OPTIONS=/s/strip/!strip/' ${PSPDEV}/etc/makepkg.conf
        chown -R build:build test ${PSPDEV}
        cd test
        sudo -u build PATH="${PATH}" PSPDEV="${PSPDEV}" LIBMAKEPKG_LINT_PACKAGE_DOTFILES_SH=0 $(which psp-makepkg) -i --noconfirm --noprogressbar
        cd -
        cat ${PSPDEV}/share/pacman/test.txt
        # Undo changes
        chown -R root:root test ${PSPDEV}
        psp-pacman -R --noconfirm psp-makepkg-test
        psp-pacman -Scc --noconfirm
        sed -i '/^OPTIONS=/s/!strip/strip/' ${PSPDEV}/etc/makepkg.conf


  build-VM:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
      fail-fast: false

    steps:
    - uses: actions/checkout@v6

    - name: Install Ubuntu build dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get -y install libcurl4 libcurl4-openssl-dev libssl-dev libarchive-tools libarchive-dev libgpgme-dev sudo

    - name: Install Mac build dependencies
      if: startsWith(matrix.os, 'macos')
      run: |
        brew install bash gnu-sed libarchive gpgme fakeroot

    - name: Compile Tools
      run: |
        export PATH="$(brew --prefix gnu-sed)/libexec/gnubin:$PATH" # This really is only needed for macOS
        export PKG_CONFIG_PATH="$(brew --prefix libarchive)/lib/pkgconfig" #This really is only needed for macOS
        export PSPDEV="$PWD/pspdev"
        ./pacman.sh

    - name: Test psp-pacman
      run: |
        export PSPDEV=$PWD/pspdev
        export PATH=$PATH:$PSPDEV/bin
        psp-pacman -Syu --noconfirm stb
        psp-pacman -Qi stb
        psp-pacman -R --noconfirm stb
        psp-pacman -Scc --noconfirm

    - name: Test psp-makepkg
      run: |
        export PSPDEV="$PWD/pspdev"
        export PATH="${PATH}:${PSPDEV}/bin"
        export PATH="$(brew --prefix gnu-sed)/libexec/gnubin:$PATH" # This really is only needed for macOS
        # Prevent stripping, since PSPDEV is not actually installed
        sed -i '/^OPTIONS=/s/strip/!strip/' ${PSPDEV}/etc/makepkg.conf
        cd test
        psp-makepkg -i --noconfirm --noprogressbar
        cd -
        cat ${PSPDEV}/share/pacman/test.txt
        # Undo changes
        psp-pacman -R --noconfirm psp-makepkg-test
        psp-pacman -Scc --noconfirm
        sed -i '/^OPTIONS=/s/!strip/strip/' ${PSPDEV}/etc/makepkg.conf

  dispatch:
    if: contains(github.ref,'refs/heads/master')
    needs: [build, build-VM]
    runs-on: ubuntu-latest
  
    steps:
    - name: Send Compile action
      run: |
        export DISPATCH_ACTION="$(echo run_build)"
        echo "NEW_DISPATCH_ACTION=$DISPATCH_ACTION" >> $GITHUB_ENV
    - name: Repository Dispatch to psptoolchain-extra
      uses: peter-evans/repository-dispatch@v4
      with:
        repository: ${{ github.repository_owner }}/psptoolchain-extra
        token: ${{ secrets.DISPATCH_TOKEN }}
        event-type: ${{ env.NEW_DISPATCH_ACTION }}
        client-payload: '{"ref": "${{ github.ref }}"}'
