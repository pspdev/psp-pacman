name: CI

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ${{ matrix.os }}
    strategy:
      matrix:
        os: [alpine:latest, fedora:latest, debian:latest]
      fail-fast: false

    steps:
    - name: Install Debian build dependencies
      if: startsWith(matrix.os, 'debian')
      run: |
        apt-get update
        apt-get install -y wget adduser build-essential meson ninja-build makepkg pkgconf curl libcurl4 libcurl4-openssl-dev libssl-dev libarchive-tools libarchive-dev libgpgme-dev git sudo
        adduser --system --group build

    - name: Install Alpine build dependencies
      if: startsWith(matrix.os, 'alpine')
      run: |
        apk add wget wget build-base bash meson ninja-build pacman pkgconfig libarchive-tools libarchive-dev openssl-dev gpgme-dev curl-dev git sudo fakeroot
        adduser -D -s /bin/bash build

    - name: Install Fedora build dependencies
      if: startsWith(matrix.os, 'fedora')
      run: |
        dnf -y install gcc meson ninja-build makepkg wget bsdtar libarchive-devel openssl-devel gpgme-devel libcurl-devel pkgconf git patch sudo which fakeroot curl
        useradd build

    - uses: actions/checkout@v6

    - name: Compile psp-pacman
      run: |
        export PSPDEV=$PWD/pspdev
        export PATH="$PATH:$PSPDEV/bin"
        if [ "$(uname -s)" == "Darwin" ]; then
          export PATH="$(brew --prefix gnu-sed)/libexec/gnubin:$PATH" # This really is only needed for macOS
          export PKG_CONFIG_PATH="$(brew --prefix libarchive)/lib/pkgconfig" #This really is only needed for macOS
        fi
        chown -R build:build .
        sudo -u build PATH="${PATH}" PSPDEV="${PSPDEV}" ./pacman.sh
        psp-pacman -V
        psp-pacman -Scc --noconfirm

    - name: Test psp-pacman
      run: |
        export PSPDEV="$PWD/pspdev"
        export PATH="$PATH:$PSPDEV/bin"
        psp-pacman -Syu --noconfirm --noprogressbar stb
        psp-pacman -Qi stb
        psp-pacman -R --noconfirm stb
        psp-pacman -Scc --noconfirm


  build-VM:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
      fail-fast: false

    steps:
    - uses: actions/checkout@v6

    - name: Install Ubuntu build dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get -y install meson makepkg libcurl4-openssl-dev libarchive-tools libarchive-dev libgpgme-dev

    - name: Install Mac build dependencies
      if: startsWith(matrix.os, 'macos')
      run: |
        brew install bash meson makepkg gnu-sed libarchive gpgme fakeroot

    - name: Compile psp-pacman
      run: |
        export PSPDEV=$PWD/pspdev
        export PATH="$PATH:$PSPDEV/bin"
        if [ "$(uname -s)" == "Darwin" ]; then
          export PATH="$(brew --prefix gnu-sed)/libexec/gnubin:$PATH" # This really is only needed for macOS
          export PKG_CONFIG_PATH="$(brew --prefix libarchive)/lib/pkgconfig" #This really is only needed for macOS
        fi
        ./pacman.sh
        psp-pacman -V
        psp-pacman -Scc --noconfirm

    - name: Test psp-pacman
      run: |
        export PSPDEV=$PWD/pspdev
        export PATH=$PATH:$PSPDEV/bin
        psp-pacman -Syu --noconfirm stb
        psp-pacman -Qi stb
        psp-pacman -R --noconfirm stb
        psp-pacman -Scc --noconfirm

  dispatch:
    if: contains(github.ref,'refs/heads/master')
    needs: [build, build-VM]
    runs-on: ubuntu-latest
  
    steps:
    - name: Send Compile action
      run: |
        export DISPATCH_ACTION="$(echo run_build)"
        echo "NEW_DISPATCH_ACTION=$DISPATCH_ACTION" >> $GITHUB_ENV
    - name: Repository Dispatch to psptoolchain-extra
      uses: peter-evans/repository-dispatch@v4
      with:
        repository: ${{ github.repository_owner }}/psptoolchain-extra
        token: ${{ secrets.DISPATCH_TOKEN }}
        event-type: ${{ env.NEW_DISPATCH_ACTION }}
        client-payload: '{"ref": "${{ github.ref }}"}'
